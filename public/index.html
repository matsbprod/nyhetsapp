<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitt nyhetsflöde</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #1d4ed8;
    --border: #e5e2db;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.25rem 1rem;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 0.75rem;
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    padding: 0.75rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .filters label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.92rem;
    cursor: pointer;
    user-select: none;
  }
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 1rem 1.25rem 3rem;
  }
  .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.85rem;
  }
  .item a {
    color: var(--text);
    text-decoration: none;
  }
  .item a:hover { color: var(--accent); }
  .item h2 {
    font-size: 1.05rem;
    margin: 0 0 0.35rem;
    line-height: 1.35;
  }
  .item p {
    margin: 0 0 0.5rem;
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.4;
  }
  .meta {
    display: flex;
    gap: 0.6rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .badge {
    display: inline-block;
    background: #eef2ff;
    color: var(--accent);
    border-radius: 999px;
    padding: 0.1rem 0.55rem;
    font-weight: 600;
  }
  .status {
    text-align: center;
    color: var(--muted);
    padding: 2rem 0;
  }
  .reader-tip {
    font-size: 0.82rem;
    color: var(--muted);
    margin: 0.6rem 0 0;
    padding: 0.5rem 0.75rem;
    background: #f1f0eb;
    border-radius: 8px;
  }
  .reader-tip kbd {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.05rem 0.35rem;
    font-family: inherit;
    font-size: 0.8rem;
  }
  .error {
    color: #b91c1c;
    font-size: 0.85rem;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<header>
  <h1>Mitt nyhetsflöde</h1>
  <div class="filters" id="filters"></div>
  <div class="reader-tip" id="reader-tip"></div>
  <div id="errors"></div>
</header>

<main>
  <div class="status" id="status">Hämtar nyheter…</div>
  <div id="list"></div>
</main>

<script>
  // Kategorier och vilka som är förvalda. Ändra defaultOn om du vill starta med annat urval.
  const CATEGORIES = [
    { name: 'Världen', defaultOn: true },
    { name: 'Kultur', defaultOn: true },
    { name: 'Sverige', defaultOn: false },
    { name: 'Sport', defaultOn: false },
    { name: 'Ekonomi', defaultOn: false },
    { name: 'Ledare & debatt', defaultOn: false },
    { name: 'Mat & livsstil', defaultOn: false },
    { name: 'Övrigt', defaultOn: false },
  ];

  let allItems = [];

  function renderFilters() {
    const el = document.getElementById('filters');
    el.innerHTML = CATEGORIES.map(c => `
      <label>
        <input type="checkbox" value="${c.name}" ${c.defaultOn ? 'checked' : ''} onchange="renderList()">
        ${c.name}
      </label>
    `).join('');
  }

  function activeCategories() {
    return Array.from(document.querySelectorAll('.filters input:checked')).map(i => i.value);
  }

  function formatDate(d) {
    try {
      return new Date(d).toLocaleString('sv-SE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch { return d; }
  }

  function renderList() {
    const active = new Set(activeCategories());
    const filtered = allItems.filter(i => active.has(i.category));
    const list = document.getElementById('list');
    const status = document.getElementById('status');

    if (filtered.length === 0) {
      status.textContent = 'Inga artiklar i valda kategorier just nu.';
      status.style.display = 'block';
      list.innerHTML = '';
      return;
    }

    status.style.display = 'none';
    list.innerHTML = filtered.map(i => `
      <div class="item">
        <a href="${i.link}" target="_blank" rel="noopener">
          <h2>${i.title}</h2>
        </a>
        <p>${i.description}</p>
        <div class="meta">
          <span class="badge">${i.category}</span>
          <span>${i.source}</span>
          <span>${formatDate(i.pubDate)}</span>
        </div>
      </div>
    `).join('');
  }

  async function load() {
    try {
      const res = await fetch('/.netlify/functions/news');
      const data = await res.json();
      allItems = data.items || [];

      if (data.errors && data.errors.length) {
        document.getElementById('errors').innerHTML =
          data.errors.map(e => `<div class="error">Kunde inte hämta: ${e}</div>`).join('');
      }

      renderList();
    } catch (err) {
      document.getElementById('status').textContent = 'Kunde inte hämta nyheter: ' + err.message;
    }
  }

  function renderReaderTip() {
    const ua = navigator.userAgent;
    const isSafari = /^((?!chrome|android).)*safari/i.test(ua);
    const isFirefox = /firefox/i.test(ua);
    const tip = document.getElementById('reader-tip');

    if (isSafari) {
      tip.innerHTML = '📖 Tips: när du öppnat en artikel, tryck <kbd>⇧</kbd> <kbd>⌘</kbd> <kbd>R</kbd> för Safaris läsläge – slipper annonser och rörig layout.';
    } else if (isFirefox) {
      tip.innerHTML = '📖 Tips: när du öppnat en artikel, klicka bok-ikonen i adressfältet för Firefox läsvy – slipper annonser och rörig layout.';
    } else {
      tip.innerHTML = '📖 Tips: många webbläsare har ett inbyggt läsläge (leta efter en ikon i adressfältet) som tar bort annonser när du öppnat en artikel.';
    }
  }

  renderFilters();
  renderReaderTip();
  load();
</script>

</body>
</html>
